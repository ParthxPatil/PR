<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce Product Listing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>🛍️ ShopEasy</h1></header>
  <div class="grid">
    <div class="card">
      <div class="img-placeholder">📱</div>
      <h3>Smartphone Pro X</h3>
      <p>6.7" AMOLED, 128GB, 5G</p>
      <span class="price">₹24,999</span>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
    <div class="card">
      <div class="img-placeholder">💻</div>
      <h3>UltraBook Slim</h3>
      <p>Intel i5, 8GB RAM, 512GB SSD</p>
      <span class="price">₹55,000</span>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
    <div class="card">
      <div class="img-placeholder">🎧</div>
      <h3>Noise-Cancel Headphones</h3>
      <p>40hr battery, Bluetooth 5.0</p>
      <span class="price">₹3,499</span>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
    <div class="card">
      <div class="img-placeholder">⌚</div>
      <h3>Smart Watch Fit</h3>
      <p>Heart rate, GPS, 7-day battery</p>
      <span class="price">₹5,999</span>
      <button onclick="addToCart(this)">Add to Cart</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
