<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: linear-gradient(135deg, #ffecd2, #fcb69f); display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .card { background: #fff; padding: 40px; border-radius: 14px; width: 460px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    h1 { text-align: center; color: #e44d26; margin-bottom: 24px; }
    label { display: block; font-weight: 600; color: #555; margin-bottom: 5px; font-size: 0.9rem; }
    input[type="text"] { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 1rem; margin-bottom: 18px; }
    .rating { display: flex; gap: 16px; margin-bottom: 18px; }
    .rating label { font-weight: normal; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 1rem; resize: vertical; min-height: 100px; margin-bottom: 18px; }
    button { width: 100%; padding: 12px; background: #e44d26; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💬 We Value Your Feedback</h1>
    <form>
      <label>Your Name</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Satisfaction Rating</label>
      <div class="rating">
        <label><input type="radio" name="rating" value="excellent" required> ⭐⭐⭐⭐⭐ Excellent</label>
        <label><input type="radio" name="rating" value="good"> ⭐⭐⭐⭐ Good</label>
        <label><input type="radio" name="rating" value="average"> ⭐⭐⭐ Average</label>
      </div>

      <label>Comments</label>
      <textarea placeholder="Share your thoughts..."></textarea>

      <button type="submit">Submit Feedback</button>
    </form>
  </div>
</body>
</html>
